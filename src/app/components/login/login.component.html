<div class="bg-canvas"></div>

<div class="login-wrapper">
  <aside class="login-aside">
    <div class="aside-photo"></div>
    <div class="aside-overlay"></div>
    <div class="aside-content">
      <p class="aside-tag">SiGA</p>
      <h2 class="aside-headline">Defensa y protección<em> de los trabajadores.</em></h2>
      <div class="aside-rule"></div>
      <p class="aside-caption">Grimaldo & Aguilar</p>
    </div>
  </aside>

  <main class="login-main">
    <div class="login-card">
      <div class="brand-block">
        <div class="brand-monogram">GA</div>
        <p class="brand-name">Grimaldo & Aguilar</p>
        <p class="brand-label">Abogados</p>
      </div>

      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-diamond" style="opacity:0.35;transform:rotate(45deg) scale(0.6)"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line"></div>
      </div>

      <form (ngSubmit)="onLogin()" class="form-block">
        <label class="field-label">Usuario o Correo</label>
        <div class="field-wrap">
          <input class="field-input" 
                 type="text" 
                 name="username" 
                 [(ngModel)]="loginData.username" 
                 placeholder="gibran.uriel" 
                 required />
          <i class="field-icon bi bi-person"></i>
        </div>

        <label class="field-label">Contraseña</label>
        <div class="field-wrap">
          <input class="field-input has-eye" 
                 [type]="showPassword ? 'text' : 'password'" 
                 name="password" 
                 [(ngModel)]="loginData.password" 
                 placeholder="••••••••" 
                 required />
          <i class="field-icon bi bi-lock"></i>
          <button class="field-eye" type="button" (click)="togglePassword()" tabindex="-1">
            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>

        <button class="btn-submit" type="submit" [disabled]="loading">
          <span *ngIf="!loading">Iniciar Sesión</span>
          <span *ngIf="loading"><i class="bi bi-arrow-repeat spin"></i></span>
        </button>
      </form>

      <p class="form-footer">Acceso restringido · Personal autorizado</p>
    </div>
  </main>
</div>
