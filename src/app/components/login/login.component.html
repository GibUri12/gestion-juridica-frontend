<div class="login-container d-flex align-items-center justify-content-center">
  <div class="card shadow-lg border-0" style="width: 400px; border-radius: 15px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-balance-scale text-primary" style="font-size: 3rem;"></i>
        <h2 class="fw-bold mt-2 text-dark">Gestión Jurídica</h2>
        <p class="text-muted">Inicie sesión para continuar</p>
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
            <input type="text" name="username" [(ngModel)]="loginData.username" 
                   class="form-control border-start-0 bg-light" placeholder="Nombre de usuario" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
            <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="loginData.password" 
                   class="form-control border-x-0 bg-light" placeholder="••••••••" required>
            <span class="input-group-text bg-light border-start-0" (click)="togglePassword()" style="cursor: pointer;">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm" style="background-color: #1a2a40; border: none;">
          INGRESAR
        </button>
      </form>
    </div>
  </div>
</div>
