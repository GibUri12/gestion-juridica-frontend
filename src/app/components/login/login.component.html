<div class="login-wrapper">
  <div class="login-aside d-none d-lg-block">
    <div class="overlay"></div>
  </div>

  <div class="login-main d-flex align-items-center justify-content-center p-3">
    
    <div class="login-form-box">
      
      <div class="text-center mb-4">
        <h1 class="logo-text mb-0">GA</h1>
        <p class="brand-subtext mb-0">Grimaldo & Aguilar</p>
        <p class="brand-lawyers small text-muted">ABOGADOS</p>
        
        <div class="divider mx-auto my-3"></div>
        <!--
        <h2 class="app-title">SiGA</h2>
        <p class="access-text text-muted">Acceso Seguro para Profesionales del Derecho</p>
      -->
      </div>

      <form (ngSubmit)="onLogin()">
        
        <div class="mb-3">
          <label class="form-label small fw-bold text-secondary">Nombre de Usuario o Correo</label>
          <div class="input-group custom-input">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" 
                   name="username" 
                   [(ngModel)]="loginData.username" 
                   class="form-control" 
                   placeholder="Ej: gibran.uriel" 
                   required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label small fw-bold text-secondary">Contraseña</label>
          <div class="input-group custom-input">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input [type]="showPassword ? 'text' : 'password'" 
                   name="password" 
                   [(ngModel)]="loginData.password" 
                   class="form-control border-end-0" 
                   placeholder="••••••••" 
                   required>
            <span class="input-group-text bg-white border-start-0" 
                  (click)="togglePassword()" 
                  style="cursor: pointer;">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye-fill text-muted'"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="btn btn-login w-100 fw-bold py-2">
          INICIAR SESIÓN
        </button>

      </form>
    </div> </div> </div>
